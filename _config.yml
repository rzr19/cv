about_content: | # this will include new lines to allow paragraphs
  Hello. I am a highly adaptable and self-taught IT Operations Specialist from Cluj-Napoca. 
  I have 8+ years of work experience that taught me <mark>patience</mark>, <mark>collaboration</mark>, <mark>humbleness</mark> and <mark>the bigger picture</mark>.
  The positions I have covered so far ranged from service desk and technical support to system administration and SAP software development.

  My hands-on knowledge revolves around app support, with an emphasis on servers and containers, SAP ECC/PO/Solman, Oracle/MsSQL/MySQL, Docker, Azure, ServiceNow, and many Linux runtime tools.
  I have skills for light development/debugging in ABAP and Java plus a ton of know-how for automation in <mark>bash</mark>, <mark>PL/SQL</mark>, python and Ansible.

